<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Portal</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f5ff;
}

/* HEADER */
.header{
background:#0b3d91;
text-align:center;
padding:20px;
color:white;
position:relative;
}

.bell{
position:absolute;
right:20px;
top:20px;
font-size:22px;
cursor:pointer;
}

/* DASHBOARD BUTTONS */
.dashboard{
padding:20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.grid button{
padding:20px;
font-size:18px;
border:none;
border-radius:10px;
background:#0b3d91;
color:white;
cursor:pointer;
}

.grid button.disabled{
background:gray;
cursor:not-allowed;
}

/* COMMON */
.section-title{
background:#d4af37;
padding:12px;
margin:15px;
border-radius:6px;
text-align:center;
font-weight:bold;
}

.profile{
background:white;
margin:15px;
padding:20px;
border-radius:10px;
}

/* BACK BUTTON */
.back-btn{
margin:15px;
padding:10px 20px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>Student Portal</h2>
<div class="bell" onclick="openNotification()">🔔</div>
</div>

<!-- LOGIN -->
<div id="loginBox" style="text-align:center;padding:30px;">
<input id="loginCode" placeholder="Enter Login Code"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="loader" style="display:none;text-align:center;">Loading...</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="profile" style="text-align:center;">
<h2 id="welcomeName"></h2>
</div>

<div class="section-title">Student Details</div>

<div class="profile">
<div>Name: <span id="studentName"></span></div>
<div>Class: <span id="class"></span></div>
<div>Admission: <span id="adm"></span></div>
</div>

<div class="dashboard">
<div class="grid">
<button onclick="openFees()">Fees</button>
<button id="attendanceBtn" onclick="openAttendance()">Attendance</button>
<button id="dsBtn" onclick="openDateSheet()">Date Sheet</button>
<button id="resultBtn" onclick="openResult()">Result</button>
</div>
</div>

</div>

<!-- FEES PAGE -->
<div id="feesPage" style="display:none">
<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="section-title">Fees Section</div>
<div class="profile">Same Fee UI will remain here (use your existing code)</div>
</div>

<!-- ATTENDANCE -->
<div id="attendancePage" style="display:none">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
<div class="profile">Nothing to show</div>
</div>

<!-- DATE SHEET -->
<div id="dsPage" style="display:none">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
<div id="dsContent" class="profile"></div>
</div>

<!-- RESULT -->
<div id="resultPage" style="display:none">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
<div class="profile">No result to show now</div>
</div>

<script src="script.js"></script>

</body>
</html>
