<!DOCTYPE html>
<html>
<head>
    <title>Student Fee Portal | Pinnacle Global School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #1a237e; --secondary: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #dashboard { display: none; max-width: 600px; }
        .profile-card { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .student-photo { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--secondary); object-fit: cover; }
        .details-grid { text-align: left; width: 100%; margin-top: 20px; }
        .detail-item { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .label { font-weight: bold; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="loginPage" class="container">
        <img src="https://via.placeholder.com/150?text=School+Logo" alt="School Logo" class="logo">
        <h2>Student Portal</h2>
        <input type="text" id="loginCode" placeholder="Enter Login Code">
        <button onclick="login()">Login</button>
        <p id="msg" style="color: red;"></p>
    </div>

    <div id="dashboard" class="container">
        <img src="https://via.placeholder.com/150?text=School+Logo" alt="School Logo" class="logo" style="max-width: 80px;">
        <div class="profile-card">
            <img id="stPhoto" class="student-photo" src="" alt="Student Photo">
            <h2 id="stName"></h2>
        </div>
        <div class="details-grid">
            <div class="detail-item"><div class="label">Admission No:</div> <span id="stAdm"></span></div>
            <div class="detail-item"><div class="label">Father's Name:</div> <span id="stFather"></span></div>
            <div class="detail-item"><div class="label">Mother's Name:</div> <span id="stMother"></span></div>
            <div class="detail-item"><div class="label">Date of Birth:</div> <span id="stDob"></span></div>
            <div class="detail-item"><div class="label">Address:</div> <span id="stAddress"></span></div>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; background:#666;">Logout</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHCaJl9AFMP2dNZPnX0WJjVtYuqFEtWVLujEtb3WPy2eRO2c85o0UtUV99WFKsxa7_/exec";

        async function login() {
            const code = document.getElementById('loginCode').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Authenticating...";

            try {
                const response = await fetch(`${SCRIPT_URL}?code=${code}`);
                const data = await response.json();

                if (data) {
                    showDashboard(data);
                } else {
                    msg.innerText = "Invalid Login Code. Please try again.";
                }
            } catch (err) {
                msg.innerText = "Connection error. Check your Script URL.";
            }
        }

        function showDashboard(data) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            document.getElementById('stName').innerText = data.name;
            document.getElementById('stAdm').innerText = data.admissionNo;
            document.getElementById('stFather').innerText = data.father;
            document.getElementById('stMother').innerText = data.mother;
            document.getElementById('stAddress').innerText = data.address;
            document.getElementById('stDob').innerText = new Date(data.dob).toLocaleDateString();
            document.getElementById('stPhoto').src = data.photo || "https://via.placeholder.com/150?text=No+Photo";
        }
    </script>
</body>
</html>
